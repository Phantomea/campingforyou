tls:
  certificates:
    - certFile: /mnt/ddev-global-cache/traefik/certs/campingforyou.crt
      keyFile: /mnt/ddev-global-cache/traefik/certs/campingforyou.key

http:
  routers:
    # ─── Backend (campingforyou.ddev.site) ─────────────────────────────────────
    campingforyou-http:
      entrypoints:
        - http-80
      rule: "Host(`campingforyou.ddev.site`)"
      service: "campingforyou"
      tls: false

    campingforyou-https:
      entrypoints:
        - http-443
      rule: "Host(`campingforyou.ddev.site`)"
      service: "campingforyou"
      tls: true

    # ─── Frontend (frontend.campingforyou.ddev.site) ────────────────────────────
    campingforyou-frontend-http:
      entrypoints:
        - http-80
      rule: "Host(`frontend.campingforyou.ddev.site`)"
      service: "campingforyou-frontend"
      tls: false

    campingforyou-frontend-https:
      entrypoints:
        - http-443
      rule: "Host(`frontend.campingforyou.ddev.site`)"
      service: "campingforyou-frontend"
      tls: true

    # ─── Mailpit (mailpit.campingforyou.ddev.site) ──────────────────────────────
    campingforyou-mailpit-http:
      entrypoints:
        - http-80
      rule: "Host(`mailpit.campingforyou.ddev.site`)"
      service: "campingforyou-mailpit"
      tls: false

    campingforyou-mailpit-https:
      entrypoints:
        - http-443
      rule: "Host(`mailpit.campingforyou.ddev.site`)"
      service: "campingforyou-mailpit"
      tls: true

    # ─── Adminer (adminer.campingforyou.ddev.site) ──────────────────────────────
    campingforyou-adminer-http:
      entrypoints:
        - http-80
      rule: "Host(`adminer.campingforyou.ddev.site`)"
      service: "campingforyou-adminer"
      tls: false

    campingforyou-adminer-https:
      entrypoints:
        - http-443
      rule: "Host(`adminer.campingforyou.ddev.site`)"
      service: "campingforyou-adminer"
      tls: true

  services:
    campingforyou:
      loadbalancer:
        servers:
          - url: "http://ddev-campingforyou-web:80"

    campingforyou-frontend:
      loadbalancer:
        servers:
          - url: "http://ddev-campingforyou-frontend-1:9000"

    campingforyou-mailpit:
      loadbalancer:
        servers:
          - url: "http://ddev-campingforyou-mailpit-1:8025"

    campingforyou-adminer:
      loadbalancer:
        servers:
          - url: "http://ddev-campingforyou-adminer:8080"
