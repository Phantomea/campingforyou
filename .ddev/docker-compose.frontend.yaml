services:
  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE: https://campingforyou.ddev.site/api
      NUXT_PUBLIC_BACKEND_URL: https://campingforyou.ddev.site
      NUXT_API_BASE_SERVER: http://web/api
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "9000"
    command: sh -c "npm install && npm run dev"
    ports:
      - "9001:9000"

volumes:
  frontend_node_modules:
