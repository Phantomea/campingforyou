services:

  # ─── MariaDB ──────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── FrankenPHP + Octane (Laravel backend) ───────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.http.services.campingforyou-backend.loadbalancer.server.port=8000
      - traefik.docker.network=coolify
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      OCTANE_SERVER: frankenphp
      SERVER_NAME: ":8000"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SOCKET: ""
      GALLERY_PATH: /var/www/gallery
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.sendgrid.net
      MAIL_PORT: 587
      MAIL_USERNAME: apikey
      MAIL_PASSWORD: ${SENDGRID_API_KEY}
      MAIL_FROM_ADDRESS: "noreply@campingforyou.sk"
      MAIL_FROM_NAME: "CampingForYou"

  # ─── Queue worker ────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    command: ["sh", "-c", "until php artisan migrate:fresh --seed --force > /dev/null 2>&1; do echo 'Waiting for DB...'; sleep 3; done && php artisan queue:work --sleep=3 --tries=3 --max-time=3600"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SOCKET: ""
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.sendgrid.net
      MAIL_PORT: 587
      MAIL_USERNAME: apikey
      MAIL_PASSWORD: ${SENDGRID_API_KEY}
      MAIL_FROM_ADDRESS: "noreply@campingforyou.sk"
      MAIL_FROM_NAME: "CampingForYou"

  # ─── Nuxt frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - traefik.http.services.campingforyou-frontend.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    environment:
      NUXT_API_BASE_SERVER: http://backend:8000/api
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_PUBLIC_BACKEND_URL: ${NUXT_PUBLIC_BACKEND_URL}

volumes:
  db_data:
